# Example deployment. Copy .env.example to .env and fill it in, then:
#   docker compose -f compose.example.yml up -d
services:
  mcp-pooler:
    image: ghcr.io/felipefontoura/mcp-pooler:latest
    # build: .                       # uncomment to build locally instead of pulling
    ports:
      - "9100:9100"
    environment:
      UPSTREAM_URL: "${UPSTREAM_URL}"
      UPSTREAM_KEY: "${UPSTREAM_KEY:-}"
      REFRESH_SEC: "${REFRESH_SEC:-45}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9100/health', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
